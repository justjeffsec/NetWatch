# ============================================
#  NetWatch — Docker Compose
# ============================================
#
#  Quick start:
#    docker compose up -d
#
#  Dashboard: http://localhost:8080
#  (Change the left side of the port mapping below if 8080 is taken)
#
#  The monitor runs with host networking so it can
#  see real network traffic on your machine.
# ============================================

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netwatch-dashboard
    ports:
      - "${NETWATCH_PORT:-8080}:8080"
    volumes:
      - netwatch-data:/app/data
    restart: unless-stopped
    # Health check defined in Dockerfile (uses node fetch, not wget)

  monitor:
    build:
      context: ./monitor
      dockerfile: Dockerfile
    container_name: netwatch-monitor
    # Host network mode is required so the monitor can see
    # real network interfaces and connections on the host.
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Override the default CMD to point to the dashboard.
    # With host networking, the monitor reaches the dashboard via
    # the published port on the host.
    command: ["--api-url", "http://localhost:${NETWATCH_PORT:-8080}", "--verbose"]
    depends_on:
      dashboard:
        condition: service_healthy
    restart: unless-stopped

volumes:
  netwatch-data:
    driver: local
